theme: osuny
_merge: deep
params:
  summary:
    position: hero
  search:
    active: false
  logo:
    header: "/assets/images/logo.svg"
    footer: "/assets/images/logo-complet.svg"
  breadcrumb:
    position: after-hero
  home:
    head:
      title: site
  posts:
    index:
      truncate_description: 0
      layout: grid # grid | list
  default:
    single:
      meta:
        position: hero
        options:
          authors: true
          dates: true
          published_at: true
          reading_time: false
          share: true
          taxonomies: true
          updated_at: false
          with_labels: false